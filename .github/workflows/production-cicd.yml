name: Enterprise AWS CI/CD Pipeline

on: 
  push:
    branches: [ "main" ]

# Only one deployment runs at a time; cancels any in-progress run on new push  
concurrency:
  group: production-deployment
  cancel-in-progress: true

# CRITICAL: Required for AWS OIDC authentication and CodeQL
permissions:
  id-token: write        # Request JWT from GitHub for OIDC
  contents: read         # Clone the repository
  security-events: write # Upload CodeQL/Trivy results to GitHub Security tab
  packages: write        # Push images to GitHub Container Registry

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECR_REPOSITORY: enterprise-gh-app
  ECS_CLUSTER: enterprise-gh-app-cluster
  ECS_SERVICE: enterprise-gh-app-service
  CONTAINER_NAME: enterprise-gh-app-container

jobs:

  # ── Job 1: Unit Tests ──────────────────────────────────────────────────────
  unit_tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci
      - run: npm test

  # ── Job 2: SAST (CodeQL) ───────────────────────────────────────────────────
  sast_scan:
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'javascript'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # ── Job 3: Build & Container Vulnerability Scan ────────────────────────────
  build_and_container_scan:
    name: Build & Scan Docker Image
    needs: [unit_tests, sast_scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build local image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: local-test-image:latest

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-test-image:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy Results to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  # ── Job 4: Deploy to AWS ECS via OIDC ─────────────────────────────────────
  deploy_to_aws_ecs:
    name: Deploy to Production
    needs: build_and_container_scan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # OIDC: No hardcoded AWS Access Keys
      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --cache-from $ECR_REGISTRY/$ECR_REPOSITORY:buildcache \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push -a $ECR_REGISTRY/$ECR_REPOSITORY
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
