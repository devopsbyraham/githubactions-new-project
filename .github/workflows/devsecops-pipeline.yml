name: Secure DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# STRICT LEAST PRIVILEGE
permissions:
  contents: read           # Read the repo code
  security-events: write   # Upload SAST results
  id-token: write          # Request OIDC cloud tokens

jobs:

  # ── Phase 2: Security Audit Job (SAST) ────────────────────────────────────
  security_audit:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── Phase 3: Optimized Build Job ──────────────────────────────────────────
  build_and_package:
    name: Build Docker Image
    needs: security_audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Docker Buildx (required for advanced caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log into GitHub Container Registry using the built-in GITHUB_TOKEN
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate and mask a temporary DB password to demonstrate secret masking
      - name: Generate and Mask Temporary DB Password
        run: |
          TEMP_PASS=$(openssl rand -base64 12)
          echo "::add-mask::$TEMP_PASS"
          echo "DB_TEMP_PASS=$TEMP_PASS" >> $GITHUB_ENV

      # Build with intelligent Docker layer caching
      - name: Build and Export Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/my-org/secure-app:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/my-org/secure-app:buildcache
          cache-to: type=registry,ref=ghcr.io/my-org/secure-app:buildcache,mode=max

  # ── Phase 4: Zero-Secret Deployment (OIDC) ────────────────────────────────
  deploy_production:
    name: Deploy via OIDC
    needs: build_and_package
    # Only run on the main branch, not on Pull Requests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # OIDC: Authenticate to AWS without any static password
      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsDeployRole
          aws-region: us-east-1

      - name: Deploy to Cloud
        run: |
          echo "Identity verified securely via OIDC."
          echo "Deploying the secure, audited, and cached container!"
          ./scripts/deploy.sh
